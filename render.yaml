# Render Blueprint — https://dashboard.render.com/blueprints
# After deploy: set VITE_API_URL on Vercel to https://niha-api.onrender.com/api
services:
  - type: web
    name: niha-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install --include=dev && npm run build --workspace @niha/api && npm run prisma:generate --workspace @niha/api && npx prisma migrate deploy --schema apps/api/prisma/schema.prisma
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: APP_URL
        value: https://niha-omega.vercel.app
      - key: APP_URLS
        value: https://niha-omega.vercel.app
      - key: DEFAULT_TIMEZONE
        value: Africa/Cairo
      - key: DEFAULT_CURRENCY
        value: EGP
